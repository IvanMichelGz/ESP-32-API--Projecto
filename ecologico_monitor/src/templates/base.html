<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ecologico-Monitor{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar navbar-dark mb-4 shadow-sm" style="background-color: #528250 !important;">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🌱 Ecologico-Monitor NoSQL</span>
            <span class="badge text-success" style="background-color: #e8f5e7; font-weight: 600; font-size: 0.85rem; padding: 0.5em 1em;">
                Monitoreo en Tiempo Real
            </span>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center text-muted mt-5 py-4 border-top">
        <p class="small">© 2026 Sistema de Gestión de Variables Ambientales - UAEMéx</p>
    </footer>
</body>
</html>
